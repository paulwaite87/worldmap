services:
  worldmap:
    container_name: worldmap
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - AIS_API_KEY=${AIS_API_KEY}
      - TZ=Pacific/Auckland
      # Standard Postgres Env Vars
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
    # ... healthcheck and logging stay the same ...
    networks:
      - wmap

  worldmap_db:
    container_name: worldmap_db
    image: postgis/postgis:15-3.3 # Adjusted to a verified tag
    environment:
      POSTGRES_USER: wmap
      POSTGRES_PASSWORD: wmap
      POSTGRES_DB: worldmap
      PGTZ: Pacific/Auckland
    ports:
      - "15432:5432"
    restart: unless-stopped
    volumes:
      - wmap-pgdata:/var/lib/postgresql/data
      - ./config/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"] # Now works automatically with env vars
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wmap

networks:
  wmap:
    driver: bridge

volumes:
  wmap-pgdata: