<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WorldMap Config Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-tabs .nav-link { color: #aaa; border: none; text-transform: capitalize; }
        .nav-tabs .nav-link.active { background-color: #495057 !important; color: #fff !important; font-weight: bold; }
        .card { border-radius: 12px; }
        .section-block { background-color: #2b3035; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .form-check-input:checked { background-color: #0d6efd; border-color: #0d6efd; }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container my-5" style="max-width: 1000px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🌍 WorldMap Control Center</h2>
            <span class="badge bg-success px-3 py-2">Dynamic Mode</span>
        </div>

        <ul class="nav nav-tabs mb-3" id="configTabs" role="tablist"></ul>

        <div class="card bg-secondary text-light p-4 shadow">
            <div id="loading" class="text-center my-3">
                <div class="spinner-border text-primary" role="status"></div>
                <div class="mt-2">Building dynamic control panels...</div>
            </div>

            <form id="configForm" class="d-none">
                <div class="tab-content" id="configTabsContent"></div>

                <button type="button" class="btn btn-primary w-100 mt-4 py-2 fw-bold shadow" onclick="saveActiveConfig()">
                    💾 Save & Overwrite System Configuration
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "http://localhost:8000/api/config";
        let rawConfigData = {};

        // Explicit map structure sorting out your configuration blocks
        const TAB_MAPPINGS = {
            "🌍 System": ["common", "map_builder", "xplanet"],
            "☁️ Atmospheric": ["clouds", "clouds_nasa", "isobars", "wind", "precipitation", "temperature"],
            "🌊 Ocean Layers": ["sst", "currents", "waves"],
            "🚢 Shipping": ["shipping", "shipping_collector"],
            "🌋 Hazards": ["storms", "lightning", "quakes", "volcanoes", "weather_scanner"]
        };

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const response = await fetch(API_URL);
                const res = await response.json();
                rawConfigData = res.data;

                renderDynamicTabs(rawConfigData);

                document.getElementById('loading').remove();
                document.getElementById('configForm').classList.remove('d-none');
            } catch (err) {
                document.getElementById('loading').innerHTML = "<span class='text-danger'>❌ API Endpoint Unreachable. Ensure container is healthy.</span>";
            }
        });

        function renderDynamicTabs(data) {
            const tabsHeader = document.getElementById('configTabs');
            const tabsContent = document.getElementById('configTabsContent');

            tabsHeader.innerHTML = "";
            tabsContent.innerHTML = "";

            let isFirstTab = true;

            // Step 1: Safely sort flat keys into section buckets
            const sectionsData = {};
            for (const flatKey in data) {
                const firstUnderscore = flatKey.indexOf('_');
                if (firstUnderscore === -1) continue;

                // Split exactly at the first underscore, preserving everything else
                const section = flatKey.substring(0, firstUnderscore);
                const realOption = flatKey.substring(firstUnderscore + 1);

                if (!sectionsData[section]) sectionsData[section] = [];
                sectionsData[section].push({ flatKey, option: realOption, value: data[flatKey] });
            }

            // Step 2: Build tabs dynamically matching TAB_MAPPINGS
            for (const [tabName, sectionsInTab] of Object.entries(TAB_MAPPINGS)) {
                const tabId = tabName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                let hasContent = false;

                const paneDiv = document.createElement('div');
                paneDiv.className = `tab-pane fade ${isFirstTab ? 'show active' : ''}`;
                paneDiv.id = `${tabId}-pane`;
                paneDiv.setAttribute('role', 'tabpanel');

                sectionsInTab.forEach(section => {
                    if (!sectionsData[section]) return;
                    hasContent = true;

                    const block = document.createElement('div');
                    block.className = 'section-block';
                    block.innerHTML = `<h5 class="text-info border-bottom border-secondary pb-2 mb-3">[${section}]</h5>`;

                    const row = document.createElement('div');
                    row.className = 'row g-3';

                    sectionsData[section].forEach(item => {
                        const col = document.createElement('div');

                        if (typeof item.value === "boolean") {
                            col.className = 'col-md-6 d-flex align-items-center mt-4';
                            col.innerHTML = `
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="${item.flatKey}" ${item.value ? 'checked' : ''}>
                                    <label class="form-check-label fw-bold ms-2" for="${item.flatKey}">${item.option}</label>
                                </div>
                            `;
                        } else {
                            const valStr = String(item.value);
                            const isLong = valStr.length > 35 || item.option.includes('url');
                            col.className = isLong ? 'col-12' : 'col-md-6';

                            col.innerHTML = `
                                <label class="form-label small text-white-50 fw-bold mb-1">${item.option}</label>
                                <input type="${typeof item.value === 'number' ? 'number' : 'text'}"
                                       step="any" class="form-control bg-dark text-light border-secondary"
                                       id="${item.flatKey}" value='${item.value}'>
                            `;
                        }
                        row.appendChild(col);
                    });

                    block.appendChild(row);
                    paneDiv.appendChild(block);
                });

                if (hasContent) {
                    const tabLi = document.createElement('li');
                    tabLi.className = 'nav-item';
                    tabLi.innerHTML = `
                        <button class="nav-link ${isFirstTab ? 'active' : ''}" id="${tabId}-tab" data-bs-toggle="tab"
                                data-bs-target="#${tabId}-pane" type="button" role="tab">${tabName}</button>
                    `;
                    tabsHeader.appendChild(tabLi);
                    tabsContent.appendChild(paneDiv);

                    isFirstTab = false;
                }
            }
        }

        async function saveActiveConfig() {
            const inputs = document.querySelectorAll("#configForm input, #configForm select");
            const payload = {};

            inputs.forEach(input => {
                if (!input.id) return;

                if (input.type === "checkbox") {
                    payload[input.id] = input.checked;
                } else if (input.type === "number") {
                    payload[input.id] = parseFloat(input.value);
                } else {
                    const val = input.value.trim();
                    if (val.startsWith("[") && val.endsWith("]")) {
                        try {
                            payload[input.id] = JSON.parse(val);
                        } catch(e) {
                            payload[input.id] = val;
                        }
                    } else {
                        payload[input.id] = val;
                    }
                }
            });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("Configuration saved safely to worldmap.conf!");
                }
            } catch (err) {
                alert("Error writing configuration back to server.");
            }
        }
    </script>
</body>
</html>
